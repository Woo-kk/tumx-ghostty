version: 1
env:
  - GO111MODULE=on
  - CGO_ENABLED=0
flags:
  - -trimpath
goos: darwin
goarch: amd64
main: ./cmd/tmux-ghostty-broker
binary: tmux-ghostty-broker-darwin-amd64
ldflags:
  - "-X github.com/guyuanshun/tmux-ghostty/internal/buildinfo.Version={{ .Env.VERSION }}"
  - "-X github.com/guyuanshun/tmux-ghostty/internal/buildinfo.Commit={{ .Env.COMMIT }}"
  - "-X github.com/guyuanshun/tmux-ghostty/internal/buildinfo.BuildDate={{ .Env.BUILD_DATE }}"
  - "-X github.com/guyuanshun/tmux-ghostty/internal/buildinfo.ReleaseRepo={{ .Env.RELEASE_REPO }}"
  - "-X github.com/guyuanshun/tmux-ghostty/internal/buildinfo.PackageID=com.guyuanshun.tmux-ghostty"
